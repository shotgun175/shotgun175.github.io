<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Lost Ark Tools">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0b94d"/>
      <stop offset="1" stop-color="#f2a93a"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0b13"/>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.25" fill="none" stroke="#54d8d2" stroke-opacity="0.28"/>
