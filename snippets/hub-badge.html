<!-- ===========================================================================
     Lost Ark Tools — hub badge
     A tiny, framework-free "Part of Lost Ark Tools" link block that any of the
     tools can embed to point visitors back to the hub.

     THIS FILE IS THE CANONICAL BADGE SOURCE. Embedded copies live in the tool
     repos; when copying, include an origin comment in the copy —
     "synced from shotgun175.github.io/snippets/hub-badge.html" — so future
     badge updates can find and refresh every copy.

     USAGE
       Paste this whole block into a footer / About / Help area. Everything is
       self-contained: scoped class names (.lat-badge*), its own colours and
       font fallbacks, no build step, no dependencies, no JavaScript.

       Style isolation is best-effort, not guaranteed: the `all: revert` reset
       applies to the root element only, so host globals that target child
       elements (e.g. `a span { ... }` or `svg { ... }`) still reach the inner
       spans/SVGs — verified by rendering the badge inside a hostile test page.
       After embedding in a style-heavy app, eyeball the badge once; if it looks
       off, scope your globals or add explicit overrides under `.lat-badge`.

       If your app already loads Cinzel / IBM Plex Mono, the badge will use them;
       otherwise it falls back to system fonts. Update the href only if the hub
       URL changes.
     =========================================================================== -->
<a class="lat-badge" href="https://shotgun175.github.io/" target="_blank" rel="noopener"
   aria-label="Part of Lost Ark Tools — see all tools">
  <style>
    .lat-badge {
      all: revert;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border: 1px solid rgba(240, 185, 77, 0.45);
      border-radius: 10px;
      background: #14172a;
      color: #ece8df;
      text-decoration: none;
      line-height: 1.2;
      font-family: "IBM Plex Mono", ui-monospace, Consolas, monospace;
      box-shadow: 0 6px 18px -10px rgba(0, 0, 0, 0.8);
      transition: border-color 0.18s ease, transform 0.18s ease;
    }
    .lat-badge * { box-sizing: border-box; }
    .lat-badge:hover { border-color: #f0b94d; transform: translateY(-1px); }
    .lat-badge:focus-visible { outline: 2px solid #54d8d2; outline-offset: 3px; }
    .lat-badge__mark { flex: none; display: block; }
    .lat-badge__text { display: flex; flex-direction: column; }
    .lat-badge__kicker {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aab0d2;
    }
    .lat-badge__name {
      font-family: "Cinzel", Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f0b94d;
    }
    .lat-badge__arrow { flex: none; color: #54d8d2; transition: transform 0.18s ease; }
    .lat-badge:hover .lat-badge__arrow { transform: translateX(3px); }
    @media (prefers-reduced-motion: reduce) {
      .lat-badge, .lat-badge__arrow { transition: none; }
    }
  </style>

  <svg class="lat-badge__mark" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
    <rect width="32" height="32" rx="7" fill="#0a0b13"/>
    <g stroke="#54d8d2" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round">
      <path d="M9 9h14M9 16h14M9 23h14M9 9v14M16 9v14M23 9v14"/>
    </g>
    <circle cx="16" cy="16" r="4.4" fill="#f0b94d"/>
  </svg>

  <span class="lat-badge__text">
    <span class="lat-badge__kicker">Part of</span>
    <span class="lat-badge__name">Lost Ark Tools</span>
  </span>

  <svg class="lat-badge__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M5 12h14M13 6l6 6-6 6"/>
  </svg>
</a>
